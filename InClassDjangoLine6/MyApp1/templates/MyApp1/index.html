<h1 class="title1">Teacher</h1>

<!-- baltlogs.com -->
<html>

<body>
    <p>Logged in as: {{request.user.username}} </p>
    <strong>Teachers</strong>

    {% if content %}
    <p> {{ content }} </p>
    <table>
        <tr>
            <th> Name </th>
            <th>Teaching Area</th>
        </tr>
        {% for teach in content%}
        <tr>
            <td>{{teach.Name}}</td>
            <td>{{teach.Area}}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <strong>No data!!</strong>
    {% endif %}
</body>
</html>
